        <div class="folder-icon music-folder">
          <span class="folder-label white-text">MUSIC</span>
        </div>
        <p class="icon-name">Music</p>
      </div>

      <div class="folder" data-folder="fits" style="left:17%; top:70%;">
        <div class="folder-icon fits-folder">
          <span class="folder-label white-text">FITS</span>
        </div>
        <p class="icon-name">Fits</p>
      </div>

      <div class="folder" data-folder="design" style="left:68%; top:10%;">
        <div class="folder-icon design-folder">
          <span class="folder-label white-text">DESIGN</span>
        </div>
        <p class="icon-name">Design</p>
      </div>

      <div class="folder" data-folder="things" style="left:85%; top:54%;">
        <div class="folder-icon things-folder">
          <span class="folder-label white-text">THINGS<br>I LIKE</span>
